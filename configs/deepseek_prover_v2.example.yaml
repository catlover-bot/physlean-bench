evaluation:
  task_type: "completion"
  input_dataset: "outputs/datasets/completion/test.jsonl"
  output_dir: "outputs/eval/deepseek_prover_v2"
  pass_at_k: [1, 5]
  max_examples: 200

model:
  adapter: "deepseek_prover_v2"
  mode: "stub"  # stub, http_api, local_server
  model_name: "deepseek-prover-v2"
  endpoint: "${DEEPSEEK_PROVER_V2_ENDPOINT}"
  api_key_env: "DEEPSEEK_PROVER_V2_API_KEY"
  temperature: 0.0
  max_tokens: 1024

verification:
  enabled: true
  lean_check_cmd: ["lake", "env", "lean"]
  timeout_seconds: 60
